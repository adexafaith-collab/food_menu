<!DOCTYPE html>
<html>
<head>
    <title>Adexa Restaurant</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        .hero{
            height:100vh;
            background:url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4');
            background-size:cover;
            background-position:center;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .overlay{
            background:rgba(0,0,0,0.6);
            padding:50px;
            border-radius:15px;
            text-align:center;
            color:white;
        }

        h1{
            font-size:50px;
            margin-bottom:20px;
        }

        p{
            font-size:20px;
            margin-bottom:30px;
        }

        .btn{
            padding:12px 25px;
            background:green;
            color:white;
            text-decoration:none;
            border-radius:8px;
            margin:10px;
        }

        .btn:hover{
            background:darkgreen;
        }
    </style>
</head>

<body>

<div class="hero">

    <div class="overlay">

        <h1>🍽 Welcome to Adexa Restaurant</h1>

        <p>
            Fresh food • Fast delivery • Delicious taste
        </p>

        <a href="/register/" class="btn">Create Account</a>

        <a href="/login/" class="btn">Login</a>

        <a href="/menu/" class="btn">View Menu</a>

    </div>

</div>

</body>
</html>

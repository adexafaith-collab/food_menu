<!DOCTYPE html>
<html>
<head>
    <title>Delete Food</title>
</head>
<body>

<h2>Delete Food</h2>

<p>Are you sure you want to delete <strong>{{ food.name }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" style="background:red;color:white;">
        Yes, Delete
    </button>
</form>

<br>

<a href="{% url 'admin_dashboard' %}">
    Cancel
</a>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Menu</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url('https://images.unsplash.com/photo-1551218808-94e220e084d2') no-repeat center center/cover;
            background-attachment: fixed;
        }

        .overlay {
            background: rgba(0,0,0,0.65);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .food-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .food-card {
            width: 250px;
            margin: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: orange;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: darkorange;
        }
    </style>
</head>

<body>

<div class="overlay">

    <h1>🍽️ Restaurant Menu</h1>

    <div class="food-container">

        {% for food in foods %}

            <div class="food-card">

                {% if food.image %}
                    <img src="{{ food.image.url }}">
                {% endif %}

                <h3>{{ food.name }}</h3>

                <p>Price: KSh {{ food.price }}</p>

                {% if food.is_available %}
                    <p>🟢 Available</p>
                {% else %}
                    <p>🔴 Out of Stock</p>
                {% endif %}

                <!-- ADD TO CART BUTTON -->
                <a href="{% url 'add_to_cart' food.id %}" class="btn">
                    Add to Cart
                </a>

            </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
